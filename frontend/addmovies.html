
<!DOCTYPE html>
<html>
<head>
<title>Add Movie</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    animation:fadeIn 1s ease;
}
/* Back Button */
.back{
    position:fixed;
    top:20px;
    left:20px;
    z-index:1000;
}
.back button{
    padding:8px 16px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

/* Form Container */

.box{
    background:#111;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* Title */

h2{
    color:white;
    margin-bottom:20px;
}

/* Inputs */

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    outline:none;
}

/* Button */

button{
    width:100%;
    padding:12px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#ff1f1f;
    transform:scale(1.05);
}

/* Animation */

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<!-- Back Button -->
<div class="back">
<button onclick="goBack()">← Back</button>
</div>

<!-- Form -->
<div class="box">

<h2>Add Movie</h2>

<form id="movieForm">

<input type="text" id="title" placeholder="Movie Title" required>

<input type="text" id="image" placeholder="Image URL" required>

<input type="text" id="description" placeholder="Description">

<input type="number" id="rating" placeholder="Rating (1-5)" min="1" max="5" required>
<input type="text" id="link" placeholder="Trailer link" required>
<button type="submit">Add Movie</button>

</form>

</div>

<script>

function goBack(){
    window.history.back();
}

document.getElementById("movieForm").addEventListener("submit", async function(e){

e.preventDefault();

const movie = {
title: document.getElementById("title").value,
image: document.getElementById("image").value,
description: document.getElementById("description").value,
rating: document.getElementById("rating").value,
link: document.getElementById("link").value
};

await fetch("http://localhost:3000/addMovie",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(movie)
});
alert("Movie Added Successfully🎬");
document.getElementById("movieForm").reset();
});
</script>
</body>
</html>
