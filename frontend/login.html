<html>
<head>
<meta name="description" content="basic login page using html and css">
<meta charset="utf-8">
<title>LOGIN PAGE</title>
<link rel="icon" type="image" href="">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<style>
body{background:url("movie.webp") no-repeat fixed;
background-size:cover;
background-position:center;
display:flex;
justify-content: center;
align-items:center;
height:100vh;
margin:0;
animation:fadePage 1.5s ease;
}
@keyframes fadePage{
from{
opacity:0;
}
to{
opacity:1;
}
}
.loginbox{border:2px solid rgba(255,255,255,.2);
border-radius:20px;
width:400px;
height:400px;
text-align:center;
background: rgba(235, 132, 132, 0.2);
backdrop-filter:blur(20px);
box-sizing:border-box;
cursor: pointer;
}
.a{margin:10px;
font-size:30px;
text-shadow:5px 3px black;
color:white;
}
.b,.c{margin:10px;
width:300px;
border:1px solid rgba(255,255,255,.2);
border-radius:20px;
border-color:white;
padding:10px 10px;
background-color:rgba(205, 12, 12, 0.2);
color:white;
font-size:15px;
}
.b::placeholder,.c::placeholder,.d,.e,.f{color:white;
opacity:1}
.d{margin-left:-20px;
margin-bottom:10px;
color:white;
}
.e{margin-left:50px;
text-decoration:none;

}
.e:hover{text-decoration:underline;
text-decoration-color:red}
form button{margin:20px;
width:100px;
border-radius:10px;
padding:5px;
}
button:hover{background-color:blue;
}
.f{margin:10px;
  font-size: 20px;
}
.m{color:red;
text-decoration:none;
font-size: 20px;
}
.m:hover{text-decoration:underline}
.container{position:relative;
margin:15px 0;
}
.container i{position:absolute;
right:60px;
top:18px;
}
</style>
</head>
<body>   
<div class="loginbox">
<h1 class="a">Review and Rating</h1>
<h2 class="a">LOGIN</h2>
<form>
<div class="container">
<input class="b" type="text" id="email" placeholder="Email" required><i class='bx bx-user'></i></div>
<div class="container">
<input class="c" type="password" id="password" placeholder="password" required><i class='bx bx-show' onclick="togglePassword()"></i></div>
<label class="d">
<input type="checkbox">Terms and Conditions</label>
<a class="e" href="login1.html">Forgot password?</a><br>
<button type="button" onclick="checkuser()">submit</button><br>
<p class="f">Don't have any account?<a class="m" href="register.html">register</a></p>
</form><br>
</div>
<script>
  function togglePassword(){

let password=document.getElementById("password");
let icon=document.querySelector(".container i.bx-show, .container i.bx-hide");

if(password.type==="password"){
password.type="text";
icon.classList.replace("bx-show","bx-hide");
}else{
password.type="password";
icon.classList.replace("bx-hide","bx-show");
}

}
  function checkuser(){
    let email=document.getElementById("email").value;
  let password=document.getElementById("password").value;
     fetch("https://movie-review-and-rating-system.onrender.com/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

.then(res=>res.json())

.then(data=>{

if(data.message==="Login Successful"){

alert("Login Successful");
setTimeout(function(){
window.location.href="mainpage.html";
},3000)
}else{

alert(data.message);

}

});
  }
</script>
</body>
</html>
